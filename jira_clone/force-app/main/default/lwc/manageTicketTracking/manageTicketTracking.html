<template>

    <!-- Error Message -->
    <template if:true={errorMessage}>
        <div class="error-box">
            <lightning-icon icon-name="utility:error" size="x-small" variant="error"></lightning-icon>
            <span>{errorMessage}</span>
            <c-ao-btn label="Dismiss" variant="ghost" onclick={clearError}></c-ao-btn>
        </div>
    </template>

    <!-- End Status Banner -->
    <template if:true={endStatusMessage}>
        <div class="info-box">
            <lightning-icon icon-name="utility:check" size="x-small" variant="success"></lightning-icon>
            <span>{endStatusMessage}</span>
            <c-ao-btn label="Dismiss" variant="ghost" onclick={clearEndStatusMessage}></c-ao-btn>
        </div>
    </template>

    <!-- Loading -->
    <template if:true={isLoading}>
        <div class="loading-spinner">
            <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
        </div>
    </template>

    <!-- Board -->
    <template if:false={isLoading}>

        <!-- Sprint Header -->
        <template if:true={sprint}>
            <div class="sprint-header">
                <h2 class="sprint-name">{sprint.Name}</h2>
                <span class="sprint-dates">{sprintDateRange}</span>
                <p class="sprint-goal">{sprint.Goal__c}</p>
            </div>
        </template>

        <template if:false={sprint}>
            <div class="no-sprint-banner">
                <p>No active sprint. Start a sprint from the Backlog page.</p>
            </div>
        </template>

        <!-- Kanban Board Columns -->
        <div class="board-columns">
            <template for:each={columns} for:item="col">
                <c-ticket-board-column
                    key={col.statusId}
                    status-id={col.statusId}
                    status-name={col.statusName}
                    tickets={col.tickets}
                    is-valid-target={col.isValidTarget}
                    member-options={memberOptions}
                    onticketdragstart={handleTicketDragStart}
                    onticketdrop={handleTicketDrop}
                    onticketdragend={handleTicketDragEnd}
                ></c-ticket-board-column>
            </template>
        </div>

    </template>

</template>
