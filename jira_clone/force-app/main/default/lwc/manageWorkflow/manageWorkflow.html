<template>
    <lightning-card title="Manage Workflow" icon-name="standard:workflow">
        <!-- Loading Indicator -->
        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Loading..."></lightning-spinner>
        </template>

        <!-- Success Message -->
        <template if:true={successMessage}>
            <div class="slds-m-around_medium">
                <lightning-alert variant="success" title="Success">{successMessage}</lightning-alert>
            </div>
        </template>

        <!-- Error Message -->
        <template if:true={errorMessage}>
            <div class="slds-m-around_medium">
                <lightning-alert variant="error" title="Error">{errorMessage}</lightning-alert>
            </div>
        </template>

        <!-- Main Content -->
        <template if:true={workflowData}>
            <div class="slds-m-around_medium">
                <!-- Workflow Title -->
                <h2 class="slds-text-heading_large slds-m-bottom_medium">
                    Workflow: {workflowData.workflow.name}
                </h2>

                <!-- Main Layout: Diagram + Sidebar -->
                <lightning-layout multiple-rows="true">
                    <!-- Left: Workflow Diagram -->
                    <lightning-layout-item size="12" medium-device-size="8" large-device-size="8">
                        <lightning-card title="Workflow Diagram">
                            <div class="slds-m-around_medium">
                                <template for:each={transitionsWithClasses} for:item="transition">
                                    <div
                                        key={transition.id}
                                        class={transition.cssClass}
                                        data-transition-id={transition.id}
                                        onclick={selectTransition}
                                    >
                                        <div class="slds-text-heading_small">
                                            {transition.name}
                                        </div>
                                        <div class="slds-m-top_small">
                                            <lightning-badge label={transition.recordStatus}></lightning-badge>
                                        </div>
                                        <div class="slds-m-top_small">
                                            {transition.fromStatus} → {transition.toStatus}
                                        </div>
                                    </div>
                                </template>

                                <!-- Add Transition Button -->
                                <lightning-button
                                    variant="brand"
                                    label="Add Transition"
                                    onclick={openAddTransitionModal}
                                    class="slds-m-top_medium"
                                ></lightning-button>
                            </div>
                        </lightning-card>
                    </lightning-layout-item>

                    <!-- Right: Sidebar with Pending Items -->
                    <lightning-layout-item size="12" medium-device-size="4" large-device-size="4">
                        <!-- Pending Transitions -->
                        <lightning-card title="Pending Transitions" class="slds-m-bottom_medium">
                            <div class="slds-m-around_medium">
                                <template if:true={pendingTransitions.length}>
                                    <template for:each={pendingTransitions} for:item="transition">
                                        <div key={transition.id} class="slds-m-bottom_small">
                                            <div class="slds-text-body_small">{transition.name}</div>
                                            <lightning-button
                                                variant="success"
                                                label="Activate"
                                                size="small"
                                                data-transition-id={transition.id}
                                                onclick={handleActivateTransition}
                                                class="slds-m-top_small"
                                            ></lightning-button>
                                        </div>
                                    </template>
                                </template>
                                <template if:false={pendingTransitions.length}>
                                    <p class="slds-text-body_small">No pending transitions</p>
                                </template>
                            </div>
                        </lightning-card>

                        <!-- Pending Validation Rules -->
                        <template if:true={selectedTransition}>
                            <lightning-card title="Pending Validation Rules">
                                <div class="slds-m-around_medium">
                                    <template if:true={pendingValidationRules.length}>
                                        <template for:each={pendingValidationRules} for:item="rule">
                                            <div key={rule.id} class="slds-m-bottom_small">
                                                <div class="slds-text-body_small">
                                                    {rule.ticketField} ({rule.type})
                                                </div>
                                                <lightning-button-group class="slds-m-top_small">
                                                    <lightning-button
                                                        variant="success"
                                                        label="Activate"
                                                        size="small"
                                                        data-rule-id={rule.id}
                                                        onclick={handleActivateValidationRule}
                                                    ></lightning-button>
                                                    <lightning-button
                                                        variant="destructive"
                                                        label="Delete"
                                                        size="small"
                                                        data-rule-id={rule.id}
                                                        onclick={handleDeleteValidationRule}
                                                    ></lightning-button>
                                                </lightning-button-group>
                                            </div>
                                        </template>
                                    </template>
                                    <template if:false={pendingValidationRules.length}>
                                        <p class="slds-text-body_small">No pending validation rules</p>
                                    </template>

                                    <!-- Add Rule Button -->
                                    <lightning-button
                                        variant="brand"
                                        label="Add Validation Rule"
                                        onclick={openAddValidationRuleModal}
                                        class="slds-m-top_medium"
                                    ></lightning-button>
                                </div>
                            </lightning-card>

                            <!-- Active Validation Rules -->
                            <template if:true={activeValidationRules.length}>
                                <lightning-card title="Active Validation Rules" class="slds-m-top_medium">
                                    <div class="slds-m-around_medium">
                                        <template for:each={activeValidationRules} for:item="rule">
                                            <div key={rule.id} class="slds-m-bottom_small">
                                                <lightning-badge label="active"></lightning-badge>
                                                <span class="slds-m-left_small">{rule.ticketField} ({rule.type})</span>
                                            </div>
                                        </template>
                                    </div>
                                </lightning-card>
                            </template>
                        </template>
                    </lightning-layout-item>
                </lightning-layout>

                <!-- Update Workflow Button -->
                <lightning-button
                    variant="brand"
                    label="Update Workflow"
                    onclick={handleUpdateWorkflow}
                    class="slds-m-top_large"
                ></lightning-button>
            </div>
        </template>

        <!-- Add Validation Rule Modal -->
        <template if:true={showAddValidationRuleModal}>
            <div class="slds-m-around_medium modal-overlay">
                <lightning-card title="Add Validation Rule">
                    <div class="modal-content">
                        <lightning-layout multiple-rows="true">
                            <lightning-layout-item size="12">
                                <lightning-combobox
                                    name="ticketField"
                                    label="Ticket Field"
                                    value={newValidationRule.ticketField}
                                    options={ticketFieldOptions}
                                    onchange={handleTicketFieldChange}
                                    required
                                ></lightning-combobox>
                            </lightning-layout-item>
                            <lightning-layout-item size="12">
                                <lightning-combobox
                                    name="validationType"
                                    label="Validation Type"
                                    value={newValidationRule.type}
                                    options={validationTypeOptions}
                                    onchange={handleValidationTypeChange}
                                    required
                                ></lightning-combobox>
                            </lightning-layout-item>
                        </lightning-layout>
                    </div>
                    <div slot="footer" class="slds-m-around_small">
                        <lightning-button
                            variant="neutral"
                            label="Cancel"
                            onclick={closeAddValidationRuleModal}
                            class="slds-m-right_small"
                        ></lightning-button>
                        <lightning-button
                            variant="brand"
                            label="Add Rule"
                            onclick={handleAddValidationRule}
                        ></lightning-button>
                    </div>
                </lightning-card>
            </div>
        </template>

        <!-- Add Transition Modal -->
        <template if:true={showAddTransitionModal}>
            <div class="slds-m-around_medium modal-overlay">
                <lightning-card title="Add Workflow Transition">
                    <div class="modal-content">
                        <lightning-layout multiple-rows="true">
                            <lightning-layout-item size="12">
                                <lightning-input
                                    name="transitionName"
                                    label="Transition Name"
                                    value={newTransition.name}
                                    onchange={handleTransitionNameChange}
                                    required
                                ></lightning-input>
                            </lightning-layout-item>
                            <lightning-layout-item size="12">
                                <lightning-combobox
                                    name="fromStatus"
                                    label="From Status"
                                    value={newTransition.fromStatus}
                                    options={statusOptions}
                                    onchange={handleFromStatusChange}
                                    required
                                ></lightning-combobox>
                            </lightning-layout-item>
                            <lightning-layout-item size="12">
                                <lightning-combobox
                                    name="toStatus"
                                    label="To Status"
                                    value={newTransition.toStatus}
                                    options={statusOptions}
                                    onchange={handleToStatusChange}
                                    required
                                ></lightning-combobox>
                            </lightning-layout-item>
                        </lightning-layout>
                    </div>
                    <div slot="footer" class="slds-m-around_small">
                        <lightning-button
                            variant="neutral"
                            label="Cancel"
                            onclick={closeAddTransitionModal}
                            class="slds-m-right_small"
                        ></lightning-button>
                        <lightning-button
                            variant="brand"
                            label="Create Transition"
                            onclick={handleAddWorkflowTransition}
                        ></lightning-button>
                    </div>
                </lightning-card>
            </div>
        </template>
    </lightning-card>
</template>
