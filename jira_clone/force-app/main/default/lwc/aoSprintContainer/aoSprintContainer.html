<template>
    <div class="sprint-container">

        <!-- Sprint Header -->
        <div class="sprint-header">
            <button class="toggle-btn" onclick={handleToggle}>
                <lightning-icon icon-name={chevronIcon} size="x-small"></lightning-icon>
            </button>
            <span class="sprint-name">{sprint.Name}</span>
            <span class="sprint-dates">{sprint.StartDate__c} → {_endDate}</span>
            <span class="sprint-status-badge">{sprint.RecordStatus__c}</span>

            <template if:false={sprint.isComplete}>
                <c-ao-btn label="Start"    variant="primary"   onclick={handleStart}></c-ao-btn>
            </template>
            <c-ao-btn label="Complete" variant="secondary" onclick={handleComplete}></c-ao-btn>
            <c-ao-btn label="Edit"     variant="secondary" onclick={handleEdit}></c-ao-btn>
            <c-ao-btn label="Delete"   variant="danger"    onclick={handleDelete}></c-ao-btn>
            <c-ao-btn label="+ Ticket" variant="ghost"     onclick={handleAddTicket}></c-ao-btn>
        </div>

        <!-- Collapsible body -->
        <template if:true={isExpanded}>
            <template if:true={sprint.Goal__c}>
                <p class="sprint-goal">{sprint.Goal__c}</p>
            </template>

            <template if:true={isLoadingTickets}>
                <lightning-spinner alternative-text="Loading tickets..." size="small"></lightning-spinner>
            </template>

            <template for:each={_tickets} for:item="ticket">
                <c-ao-ticket-item
                    key={ticket.Id}
                    ticket={ticket}
                    status-options={statusOptions}
                    member-options={memberOptions}
                    priority-options={priorityOptions}
                    project-id={projectId}
                    epics={epics}
                    onticketdeleted={handleTicketDeleted}
                    onticketupdated={handleTicketUpdated}>
                </c-ao-ticket-item>
            </template>

            <template if:false={hasTickets}>
                <template if:false={isLoadingTickets}>
                    <p class="empty-sprint">No tickets in this sprint.</p>
                </template>
            </template>

            <!-- Pagination footer -->
            <div class="pagination-footer">
                <c-ao-btn
                    icon-name="utility:chevronleft"
                    variant="secondary"
                    size="sm"
                    title="Previous page"
                    disabled={isFirstPage}
                    onclick={handlePrevPage}>
                </c-ao-btn>
                <span class="page-indicator">Page {currentPage}</span>
                <c-ao-btn
                    icon-name="utility:chevronright"
                    variant="secondary"
                    size="sm"
                    title="Next page"
                    disabled={isLastPage}
                    onclick={handleNextPage}>
                </c-ao-btn>
            </div>
        </template>

    </div>
</template>
