<template>
    <div class="slds-var-m-around_medium">
        <h2 class="slds-text-heading_large slds-var-m-bottom_medium">Create Subtask</h2>

        <template if:true={successMessage}>
            <div class="slds-notify slds-notify_alert slds-alert_success slds-var-m-bottom_medium" role="alert">
                <span class="slds-assistive-text">success</span>
                <span class="slds-notify__content">
                    <h2 class="slds-text-heading_small">{successMessage}</h2>
                </span>
            </div>
        </template>

        <template if:true={errorMessage}>
            <div class="slds-notify slds-notify_alert slds-alert_error slds-var-m-bottom_medium" role="alert">
                <span class="slds-assistive-text">error</span>
                <span class="slds-notify__content">
                    <h2 class="slds-text-heading_small">{errorMessage}</h2>
                </span>
            </div>
        </template>

        <button class="slds-button slds-button_brand slds-m-bottom_medium" onclick={toggleForm}>
            <template if:true={showForm}>Close Form</template>
            <template if:false={showForm}>Open Form</template>
        </button>

        <template if:true={showForm}>
            <div class="slds-box slds-var-m-bottom_medium">
                <form class="slds-form slds-form_stacked">

                    <!-- Summary -->
                    <div class="slds-form-element">
                        <label class="slds-form-element__label" for="summary">
                            <abbr class="slds-required">*</abbr>Summary
                        </label>
                        <div class="slds-form-element__control">
                            <input id="summary" class="slds-input" type="text" value={newSubtask.summary} onchange={handleSummaryChange} />
                        </div>
                    </div>

                    <!-- Description -->
                    <div class="slds-form-element">
                        <label class="slds-form-element__label" for="description">Description</label>
                        <div class="slds-form-element__control">
                            <textarea id="description" class="slds-textarea" value={newSubtask.description} onchange={handleDescriptionChange}></textarea>
                        </div>
                    </div>

                    <!-- Start Date -->
                    <div class="slds-form-element">
                        <label class="slds-form-element__label" for="startDate">Start Date</label>
                        <div class="slds-form-element__control">
                            <input id="startDate" class="slds-input" type="date" value={newSubtask.startDate} onchange={handleStartDateChange} />
                        </div>
                    </div>

                    <!-- (Due Date removed - calculated) -->

                    <!-- Story Point -->
                    <div class="slds-form-element">
                        <label class="slds-form-element__label" for="storyPoint">Story Point</label>
                        <div class="slds-form-element__control">
                            <input id="storyPoint" class="slds-input" type="number" min="0" value={newSubtask.storyPoint} onchange={handleStoryPointChange} />
                        </div>
                    </div>

                    <!-- Ticket Select -->
                    <div class="slds-form-element">
                        <label class="slds-form-element__label" for="ticketSelect">
                            <abbr class="slds-required">*</abbr>Ticket
                        </label>
                        <div class="slds-form-element__control">
                            <select id="ticketSelect" class="slds-select" value={newSubtask.ticketId} onchange={handleTicketChange}>
                                <template for:each={ticketOptions} for:item="opt">
                                    <option key={opt.value} value={opt.value}>{opt.label}</option>
                                </template>
                            </select>
                        </div>
                    </div>

                    <!-- Assignee Select -->
                    <div class="slds-form-element">
                        <label class="slds-form-element__label" for="assigneeSelect">Assignee</label>
                        <div class="slds-form-element__control">
                            <select id="assigneeSelect" class="slds-select" value={newSubtask.assigneeId} onchange={handleAssigneeChange}>
                                <template for:each={userOptions} for:item="opt">
                                    <option key={opt.value} value={opt.value}>{opt.label}</option>
                                </template>
                            </select>
                        </div>
                    </div>

                    <!-- Current State Select -->
                    <div class="slds-form-element">
                        <label class="slds-form-element__label" for="stateSelect">Current State</label>
                        <div class="slds-form-element__control">
                            <select id="stateSelect" class="slds-select" value={newSubtask.currentStateId} onchange={handleStateChange}>
                                <template for:each={statusOptions} for:item="opt">
                                    <option key={opt.value} value={opt.value}>{opt.label}</option>
                                </template>
                            </select>
                        </div>
                    </div>

                    <!-- Buttons -->
                    <div class="slds-var-m-top_medium">
                        <button class="slds-button slds-button_brand" type="button" onclick={handleCreateSubtask} disabled={isLoading}>
                            <template if:false={isLoading}>Create Subtask</template>
                            <template if:true={isLoading}>Creating...</template>
                        </button>
                        <button class="slds-button slds-button_neutral slds-var-m-left_small" type="button" onclick={toggleForm}>Cancel</button>
                    </div>
                </form>
            </div>
        </template>
    </div>
</template>
