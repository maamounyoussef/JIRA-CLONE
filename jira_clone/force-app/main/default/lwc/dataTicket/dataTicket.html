<template>
    <div class="slds-var-m-around_medium">
        <h2 class="slds-text-heading_large slds-var-m-bottom_medium">Create Ticket</h2>

        <template if:true={successMessage}>
            <div class="slds-notify slds-notify_alert slds-alert_success slds-var-m-bottom_medium" role="alert">
                <span class="slds-assistive-text">success</span>
                <span class="slds-notify__content">
                    <h2 class="slds-text-heading_small">{successMessage}</h2>
                </span>
            </div>
        </template>

        <template if:true={errorMessage}>
            <div class="slds-notify slds-notify_alert slds-alert_error slds-var-m-bottom_medium" role="alert">
                <span class="slds-assistive-text">error</span>
                <span class="slds-notify__content">
                    <h2 class="slds-text-heading_small">{errorMessage}</h2>
                </span>
            </div>
        </template>

        <button class="slds-button slds-button_brand slds-m-bottom_medium" onclick={toggleForm}>
            <template if:true={showForm}>Close Form</template>
            <template if:false={showForm}>Open Form</template>
        </button>

        <template if:true={showForm}>
            <div class="slds-box slds-var-m-bottom_medium">
                <form class="slds-form slds-form_stacked">
                    <!-- Summary -->
                    <div class="slds-form-element">
                        <label class="slds-form-element__label" for="summary">Summary</label>
                        <div class="slds-form-element__control">
                            <input id="summary" class="slds-input" type="text" value={newTicket.summary} onchange={handleSummaryChange} />
                        </div>
                    </div>

                    <!-- Description -->
                    <div class="slds-form-element">
                        <label class="slds-form-element__label" for="description">Description</label>
                        <div class="slds-form-element__control">
                            <textarea id="description" class="slds-textarea" value={newTicket.description} onchange={handleDescriptionChange}></textarea>
                        </div>
                    </div>

                    <!-- Project -->
                    <div class="slds-form-element">
                        <label class="slds-form-element__label" for="projectSelect">Project</label>
                        <div class="slds-form-element__control">
                            <select id="projectSelect" class="slds-select" value={newTicket.projectId} onchange={handleProjectChange}>
                                <template for:each={projectOptions} for:item="opt">
                                    <option key={opt.value} value={opt.value}>{opt.label}</option>
                                </template>
                            </select>
                        </div>
                    </div>

                    <!-- Type -->
                    <div class="slds-form-element">
                        <label class="slds-form-element__label" for="typeSelect">Type</label>
                        <div class="slds-form-element__control">
                            <select id="typeSelect" class="slds-select" value={newTicket.typeId} onchange={handleTypeChange}>
                                <template for:each={typeOptions} for:item="opt">
                                    <option key={opt.value} value={opt.value}>{opt.label}</option>
                                </template>
                            </select>
                        </div>
                    </div>

                    <!-- Sprint -->
                    <div class="slds-form-element">
                        <label class="slds-form-element__label" for="sprintSelect">Sprint</label>
                        <div class="slds-form-element__control">
                            <select id="sprintSelect" class="slds-select" value={newTicket.sprintId} onchange={handleSprintChange}>
                                <template for:each={sprintOptions} for:item="opt">
                                    <option key={opt.value} value={opt.value}>{opt.label}</option>
                                </template>
                            </select>
                        </div>
                    </div>

                    <!-- Assigned To -->
                    <div class="slds-form-element">
                        <label class="slds-form-element__label" for="assigneeSelect">Assigned To</label>
                        <div class="slds-form-element__control">
                            <select id="assigneeSelect" class="slds-select" value={newTicket.assignedId} onchange={handleAssigneeChange}>
                                <template for:each={userOptions} for:item="opt">
                                    <option key={opt.value} value={opt.value}>{opt.label}</option>
                                </template>
                            </select>
                        </div>
                    </div>

                    <!-- Current State -->
                    <div class="slds-form-element">
                        <label class="slds-form-element__label" for="stateSelect">Current State</label>
                        <div class="slds-form-element__control">
                            <select id="stateSelect" class="slds-select" value={newTicket.currentStateId} onchange={handleStateChange}>
                                <template for:each={statusOptions} for:item="opt">
                                    <option key={opt.value} value={opt.value}>{opt.label}</option>
                                </template>
                            </select>
                        </div>
                    </div>

                    <!-- Dates & Story Points -->
                    <div class="slds-form-element">
                        <label class="slds-form-element__label" for="startDate">Start Date</label>
                        <div class="slds-form-element__control">
                            <input id="startDate" class="slds-input" type="date" value={newTicket.startDate} onchange={handleStartDateChange} />
                        </div>
                    </div>

                    <div class="slds-form-element">
                        <label class="slds-form-element__label" for="endDate">End Date</label>
                        <div class="slds-form-element__control">
                            <input id="endDate" class="slds-input" type="date" value={newTicket.endDate} onchange={handleEndDateChange} />
                        </div>
                    </div>

                    <div class="slds-form-element">
                        <label class="slds-form-element__label" for="storyPoint">Story Point</label>
                        <div class="slds-form-element__control">
                            <input id="storyPoint" class="slds-input" type="number" min="0" value={newTicket.storyPoint} onchange={handleStoryPointChange} />
                        </div>
                    </div>

                    <!-- Buttons -->
                    <div class="slds-var-m-top_medium">
                        <button class="slds-button slds-button_brand" type="button" onclick={handleCreateTicket} disabled={isLoading}>
                            <template if:false={isLoading}>Create Ticket</template>
                            <template if:true={isLoading}>Creating...</template>
                        </button>
                        <button class="slds-button slds-button_neutral slds-var-m-left_small" type="button" onclick={toggleForm}>Cancel</button>
                    </div>
                </form>
            </div>
        </template>
    </div>
</template>
