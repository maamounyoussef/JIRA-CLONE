<template>

    <!-- Confirm Dialog -->
    <template if:true={showConfirmDialog}>
        <section role="dialog" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <div class="slds-modal__content slds-p-around_medium">
                    <p>{confirmMessage}</p>
                </div>
                <div class="slds-modal__footer">
                    <c-ao-btn label="Cancel"  variant="ghost"  onclick={handleCancelConfirm}></c-ao-btn>
                    <c-ao-btn label="Confirm" variant="danger" onclick={handleConfirm}></c-ao-btn>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <!-- Create Subtask Modal -->
    <template if:true={showCreateSubtaskModal}>
        <section role="dialog" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <h2>Create Subtask</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <c-ao-input
                        label="Summary"
                        value={newSubtask.summary}
                        required
                        data-field="summary"
                        onchange={handleNewSubtaskChange}>
                    </c-ao-input>
                    <c-ao-input
                        label="Description"
                        value={newSubtask.description}
                        data-field="description"
                        onchange={handleNewSubtaskChange}>
                    </c-ao-input>
                    <c-ao-combobox
                        label="Assignee"
                        value={newSubtask.assigneeId}
                        options={memberOptions}
                        data-field="assigneeId"
                        onchange={handleNewSubtaskChange}>
                    </c-ao-combobox>
                    <c-ao-combobox
                        label="State"
                        value={newSubtask.currentStateId}
                        options={statusOptions}
                        data-field="currentStateId"
                        onchange={handleNewSubtaskChange}>
                    </c-ao-combobox>
                    <c-ao-input
                        label="Story Points"
                        type="number"
                        value={newSubtask.storyPoint}
                        data-field="storyPoint"
                        onchange={handleNewSubtaskChange}>
                    </c-ao-input>
                    <template if:true={modalError}>
                        <p class="modal-error">{modalError}</p>
                    </template>
                </div>
                <div class="slds-modal__footer">
                    <c-ao-btn label="Cancel" variant="ghost"   onclick={handleCloseCreateSubtaskModal}></c-ao-btn>
                    <c-ao-btn label="Create" variant="primary" onclick={handleCreateSubtaskSubmit}></c-ao-btn>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <!-- Epic Parent Update Modal -->
    <template if:true={showEpicModal}>
        <section role="dialog" class="slds-modal slds-fade-in-open epic-modal">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <h2>{epicModalTitle}</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <template if:false={hasEpics}>
                        <div class="epic-empty-state">
                            <lightning-icon icon-name="utility:einstein" size="large" class="empty-icon"></lightning-icon>
                            <h3>No Epics Found</h3>
                            <p>There are no epics available for this project. Create your first epic to assign this ticket.</p>
                            <button class="create-first-epic-btn" onclick={handleOpenCreateEpicFromEmpty}>
                                Create First Epic
                            </button>
                        </div>
                    </template>
                    <template if:true={hasEpics}>
                        <div class="epic-selection">
                            <p class="epic-hint">Select an epic to assign as the parent for this ticket:</p>
                            <c-ao-combobox
                                label="Epic"
                                placeholder="Choose an Epic..."
                                value={selectedEpicId}
                                options={epicOptions}
                                onchange={handleEpicSelectionChange}>
                            </c-ao-combobox>
                            <div class="or-divider">
                                <span>or</span>
                            </div>
                            <button class="create-epic-link" onclick={handleOpenCreateEpicFromSelection}>
                                Create a new epic
                            </button>
                        </div>
                    </template>
                    <template if:true={modalError}>
                        <p class="modal-error">{modalError}</p>
                    </template>
                </div>
                <div class="slds-modal__footer">
                    <c-ao-btn label="Cancel" variant="ghost" onclick={handleCloseEpicModal}></c-ao-btn>
                    <template if:true={hasEpics}>
                        <c-ao-btn label="Assign Epic" variant="primary" disabled={isEpicAssignDisabled} onclick={handleAssignEpic}></c-ao-btn>
                    </template>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <!-- Create Epic Modal -->
    <template if:true={showCreateEpicModal}>
        <section role="dialog" class="slds-modal slds-fade-in-open epic-modal">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <h2>Create Epic</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <c-ao-input
                        label="Epic Name"
                        value={newEpic.name}
                        required
                        data-field="name"
                        onchange={handleNewEpicChange}>
                    </c-ao-input>
                    <c-ao-input
                        label="Summary"
                        value={newEpic.summary}
                        required
                        data-field="summary"
                        onchange={handleNewEpicChange}>
                    </c-ao-input>
                    <c-ao-input
                        label="Description"
                        value={newEpic.description}
                        data-field="description"
                        onchange={handleNewEpicChange}>
                    </c-ao-input>
                    <c-ao-input
                        label="Start Date"
                        type="date"
                        value={newEpic.startDate}
                        data-field="startDate"
                        onchange={handleNewEpicChange}>
                    </c-ao-input>
                    <c-ao-input
                        label="End Date"
                        type="date"
                        value={newEpic.endDate}
                        data-field="endDate"
                        onchange={handleNewEpicChange}>
                    </c-ao-input>
                    <template if:true={modalError}>
                        <p class="modal-error">{modalError}</p>
                    </template>
                </div>
                <div class="slds-modal__footer">
                    <c-ao-btn label="Cancel" variant="ghost"   onclick={handleCloseCreateEpicModal}></c-ao-btn>
                    <c-ao-btn label="Create" variant="primary" onclick={handleCreateEpicSubmit}></c-ao-btn>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <!-- ═══════════════════════════════════════════════════════════════════
         TICKET ROW
         ═══════════════════════════════════════════════════════════════════ -->
    <div class="ticket-row">

        <!-- LEFT: checkbox, expand, identity -->
        <div class="ticket-left">

            <c-ao-input
                type="checkbox"
                checked={ticket.isSelected}
                onchange={handleSelect}>
            </c-ao-input>

            <div class="icon-wrapper">
                <c-ao-btn
                    icon-name={expandIcon}
                    variant="bare"
                    size="sm"
                    title="Expand subtasks"
                    onclick={handleToggleSubtasks}>
                </c-ao-btn>
            </div>

            <div class="ticket-identity">
                <span class="ticket-key">{ticket.Name}</span>

                <template if:false={isEditingSummary}>
                    <span class="ticket-summary">{ticket.Summary__c}</span>
                    <c-ao-btn
                        icon-name="utility:edit"
                        variant="bare"
                        size="sm"
                        title="Edit summary"
                        onclick={handleStartEditSummary}>
                    </c-ao-btn>
                </template>
                <template if:true={isEditingSummary}>
                    <c-ao-input
                        value={summaryDraft}
                        class="summary-input"
                        onchange={handleSummaryDraftChange}>
                    </c-ao-input>
                    <c-ao-btn
                        icon-name="utility:check"
                        variant="bare"
                        size="sm"
                        title="Save"
                        onclick={handleSaveSummary}>
                    </c-ao-btn>
                    <c-ao-btn
                        icon-name="utility:close"
                        variant="bare"
                        size="sm"
                        title="Cancel"
                        onclick={handleCancelEditSummary}>
                    </c-ao-btn>
                </template>
            </div>
        </div>

        <!-- RIGHT: state, epic, priority, assignee, actions -->
        <div class="ticket-right">

            <div class="ticket-state">
                <c-ao-combobox
                    variant="label-hidden"
                    placeholder="State"
                    value={ticket.CurrentState__c}
                    options={statusOptions}
                    onchange={handleStateChange}>
                </c-ao-combobox>
            </div>

            <div class="ticket-epic" onclick={handleOpenEpicModal} title="Click to assign epic">
                <template if:true={ticket.Epic__c}>
                    <span class="epic-badge">{ticket.epicName}</span>
                </template>
                <template if:false={ticket.Epic__c}>
                    <span class="epic-missing-badge">
                        <lightning-icon icon-name="utility:warning" size="x-small" variant="warning"></lightning-icon>
                        No Epic
                    </span>
                </template>
            </div>

            <div class="ticket-priority">
                <template if:false={isEditingPriority}>
                    <button class="priority-btn" onclick={handleStartEditPriority}>
                        {priorityLabel}
                    </button>
                </template>
                <template if:true={isEditingPriority}>
                    <div class="priority-edit-container" onblur={handleBlurPriority} tabindex="-1">
                        <c-ao-combobox
                            variant="label-hidden"
                            value={priorityDraft}
                            options={priorityOptions}
                            onchange={handlePriorityDraftChange}>
                        </c-ao-combobox>
                        <c-ao-btn
                            icon-name="utility:check"
                            variant="bare"
                            size="sm"
                            title="Save priority"
                            onclick={handleSavePriority}>
                        </c-ao-btn>
                        <c-ao-btn
                            icon-name="utility:close"
                            variant="bare"
                            size="sm"
                            title="Cancel"
                            onclick={handleCancelEditPriority}>
                        </c-ao-btn>
                    </div>
                </template>
            </div>

            <div class="ticket-assignee">
                <c-ao-combobox
                    variant="label-hidden"
                    placeholder="─"
                    value={ticket.AssignedTo__c}
                    options={comboboxAssigneeOptions}
                    onchange={handleAssigneeChange}
                    onclick={handleLoadMembers}
                    onfocus={handleLoadMembers}>
                </c-ao-combobox>
            </div>

            <c-ao-btn
                icon-name="utility:delete"
                variant="bare"
                size="sm"
                title="Delete ticket"
                onclick={handleDeleteClick}>
            </c-ao-btn>

            <c-ao-btn
                icon-name="utility:add"
                variant="bare"
                size="sm"
                title="Add subtask"
                onclick={handleOpenCreateSubtaskModal}>
            </c-ao-btn>
        </div>

    </div>

    <!-- Meta row -->
    <div class="ticket-meta-row">
        <span class="ticket-type-badge">{ticket.ticketTypeName}</span>
        <span class="sp-badge">SP: {spLabel}</span>
    </div>

    <!-- Error -->
    <template if:true={errorMessage}>
        <div class="ticket-error">
            <lightning-icon icon-name="utility:error" size="x-small" variant="error"></lightning-icon>
            <span>{errorMessage}</span>
            <c-ao-btn
                icon-name="utility:close"
                variant="bare"
                size="sm"
                title="Dismiss"
                onclick={clearError}>
            </c-ao-btn>
        </div>
    </template>

    <!-- ── Subtasks ─────────────────────────────────────────────────────── -->
    <template if:true={isExpanded}>
        <div class="subtasks-wrapper">
            <template if:true={isLoadingSubtasks}>
                <lightning-spinner alternative-text="Loading subtasks..." size="small"></lightning-spinner>
            </template>
            <template for:each={subtasks} for:item="sub">
                <div key={sub.Id}>
                    <div class="subtask-row">

                        <c-ao-input
                            type="checkbox"
                            checked={sub.isSelected}
                            data-id={sub.Id}
                            onchange={handleSubtaskSelect}>
                        </c-ao-input>

                        <div class="subtask-summary">
                            <template if:false={sub.isEditingSummary}>
                                <span class="summary-text">{sub.Summary__c}</span>
                                <c-ao-btn
                                    icon-name="utility:edit"
                                    variant="bare"
                                    size="sm"
                                    title="Edit"
                                    data-id={sub.Id}
                                    onclick={handleSubtaskStartEditSummary}>
                                </c-ao-btn>
                            </template>
                            <template if:true={sub.isEditingSummary}>
                                <c-ao-input
                                    value={sub.summaryDraft}
                                    class="summary-input"
                                    data-id={sub.Id}
                                    onchange={handleSubtaskSummaryDraftChange}>
                                </c-ao-input>
                                <c-ao-btn
                                    icon-name="utility:check"
                                    variant="bare"
                                    size="sm"
                                    title="Save"
                                    data-id={sub.Id}
                                    onclick={handleSubtaskSaveSummary}>
                                </c-ao-btn>
                                <c-ao-btn
                                    icon-name="utility:close"
                                    variant="bare"
                                    size="sm"
                                    title="Cancel"
                                    data-id={sub.Id}
                                    onclick={handleSubtaskCancelEditSummary}>
                                </c-ao-btn>
                            </template>
                        </div>

                        <span class="subtask-state">{sub.stateName}</span>

                        <c-ao-combobox
                            variant="label-hidden"
                            placeholder="─"
                            value={sub.Assignee__c}
                            options={sub.subtaskComboboxOptions}
                            data-id={sub.Id}
                            onchange={handleSubtaskAssigneeChange}
                            onfocus={handleLoadMembers}
                            onclick={handleLoadMembers}>
                        </c-ao-combobox>

                        <c-ao-btn
                            icon-name="utility:delete"
                            variant="bare"
                            size="sm"
                            title="Delete subtask"
                            data-id={sub.Id}
                            onclick={handleSubtaskDeleteClick}>
                        </c-ao-btn>

                    </div>
                    <template if:true={sub.subtaskError}>
                        <div class="subtask-error">
                            <lightning-icon icon-name="utility:error" size="x-small" variant="error"></lightning-icon>
                            <span>{sub.subtaskError}</span>
                        </div>
                    </template>
                </div>
            </template>
            <template if:false={hasSubtasks}>
                <p class="no-subtasks">No subtasks yet.</p>
            </template>
        </div>
    </template>

</template>
