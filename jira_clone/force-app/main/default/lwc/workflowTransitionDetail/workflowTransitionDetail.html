<template>
    <div class="transition-detail-container">
        <!-- Loading Indicator -->
        <template if:true={isLoading}>
            <div class="slds-m-around_medium">
                <lightning-spinner alternative-text="Loading..."></lightning-spinner>
            </div>
        </template>

        <!-- Error Message -->
        <template if:true={errorMessage}>
            <div class="slds-m-around_medium">
                <lightning-alert variant="error" title="Error">{errorMessage}</lightning-alert>
            </div>
        </template>

        <!-- Transition Detail -->
        <template if:true={transitionData}>
            <lightning-card title="Transition Detail" icon-name="utility:flow">
                <!-- Close Button -->
                <div slot="actions">
                    <lightning-button
                        variant="neutral"
                        label="Close"
                        onclick={handleClose}
                        icon-name="utility:close"
                    ></lightning-button>
                </div>

                <!-- Content -->
                <div class="slds-m-around_medium">
                    <!-- Transition Name -->
                    <div class="detail-field">
                        <dt class="detail-label">
                            <lightning-icon
                                icon-name="utility:text"
                                alternative-text="Name"
                                title="Name"
                            ></lightning-icon>
                            <span>Transition Name</span>
                        </dt>
                        <dd class="detail-value">
                            <strong>{transitionData.Name}</strong>
                        </dd>
                    </div>

                    <!-- Transition ID -->
                    <div class="detail-field">
                        <dt class="detail-label">
                            <lightning-icon
                                icon-name="utility:unicode"
                                alternative-text="ID"
                                title="ID"
                            ></lightning-icon>
                            <span>ID</span>
                        </dt>
                        <dd class="detail-value">
                            <code class="id-value">{transitionData.Id}</code>
                        </dd>
                    </div>

                    <!-- From Status -->
                    <div class="detail-field">
                        <dt class="detail-label">
                            <lightning-icon
                                icon-name="utility:forward"
                                alternative-text="From"
                                title="From Status"
                            ></lightning-icon>
                            <span>From Status</span>
                        </dt>
                        <dd class="detail-value">
                            <span class="status-badge from">{fromStatusName}</span>
                        </dd>
                    </div>

                    <!-- To Status -->
                    <div class="detail-field">
                        <dt class="detail-label">
                            <lightning-icon
                                icon-name="utility:forward"
                                alternative-text="To"
                                title="To Status"
                            ></lightning-icon>
                            <span>To Status</span>
                        </dt>
                        <dd class="detail-value">
                            <span class="status-badge to">{toStatusName}</span>
                        </dd>
                    </div>

                    <!-- Record Status -->
                    <div class="detail-field">
                        <dt class="detail-label">
                            <lightning-icon
                                icon-name="utility:record"
                                alternative-text="Status"
                                title="Record Status"
                            ></lightning-icon>
                            <span>Record Status</span>
                        </dt>
                        <dd class="detail-value">
                            <lightning-badge label={transitionData.RecordStatus__c}></lightning-badge>
                        </dd>
                    </div>

                    <!-- Created Date -->
                    <div class="detail-field">
                        <dt class="detail-label">
                            <lightning-icon
                                icon-name="utility:date_input"
                                alternative-text="Created"
                                title="Created Date"
                            ></lightning-icon>
                            <span>Created Date</span>
                        </dt>
                        <dd class="detail-value">
                            {formattedCreatedDate}
                        </dd>
                    </div>
                </div>
            </lightning-card>
        </template>
    </div>
</template>
