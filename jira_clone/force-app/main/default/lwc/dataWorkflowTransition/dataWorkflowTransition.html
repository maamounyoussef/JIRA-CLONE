<template>
    <div class="slds-var-m-around_medium">
        <h2 class="slds-text-heading_large slds-var-m-bottom_medium">Create Workflow Transition</h2>

        <!-- Messages -->
        <template if:true={successMessage}>
            <div class="slds-notify slds-notify_alert slds-alert_success slds-var-m-bottom_medium" role="alert">
                <span class="slds-assistive-text">success</span>
                <span class="slds-notify__content">
                    <h2 class="slds-text-heading_small">{successMessage}</h2>
                </span>
            </div>
        </template>

        <template if:true={errorMessage}>
            <div class="slds-notify slds-notify_alert slds-alert_error slds-var-m-bottom_medium" role="alert">
                <span class="slds-assistive-text">error</span>
                <span class="slds-notify__content">
                    <h2 class="slds-text-heading_small">{errorMessage}</h2>
                </span>
            </div>
        </template>

        <!-- Toggle Button -->
        <button class="slds-button slds-button_brand slds-m-bottom_medium" onclick={toggleForm}>
            <template if:true={showForm}>Close Form</template>
            <template if:false={showForm}>Open Form</template>
        </button>

        <!-- Form -->
        <template if:true={showForm}>
            <div class="slds-box slds-var-m-bottom_medium">
                <form class="slds-form slds-form_stacked">
                    <!-- Transition Name Field -->
                    <div class="slds-form-element">
                        <label class="slds-form-element__label" for="transitionName">
                            <abbr class="slds-required">*</abbr>Transition Name
                        </label>
                        <div class="slds-form-element__control">
                            <input
                                id="transitionName"
                                class="slds-input"
                                type="text"
                                placeholder="e.g., Start Work, Complete, Reopen"
                                value={newTransition.name}
                                onchange={handleNameChange}
                            />
                        </div>
                    </div>

                    <!-- Workflow Selection -->
                    <div class="slds-form-element">
                        <label class="slds-form-element__label" for="workflowSelect">
                            <abbr class="slds-required">*</abbr>Workflow
                        </label>
                        <div class="slds-form-element__control">
                            <select
                                id="workflowSelect"
                                class="slds-select"
                                value={newTransition.workflowId}
                                onchange={handleWorkflowChange}
                            >
                                <template for:each={workflowOptions} for:item="option">
                                    <option key={option.value} value={option.value}>{option.label}</option>
                                </template>
                            </select>
                        </div>
                    </div>

                    <!-- From Status Selection -->
                    <div class="slds-form-element">
                        <label class="slds-form-element__label" for="fromStatusSelect">
                            <abbr class="slds-required">*</abbr>From Status
                        </label>
                        <div class="slds-form-element__control">
                            <select
                                id="fromStatusSelect"
                                class="slds-select"
                                value={newTransition.fromStatusId}
                                onchange={handleFromStatusChange}
                            >
                                <template for:each={statusOptions} for:item="option">
                                    <option key={option.value} value={option.value}>{option.label}</option>
                                </template>
                            </select>
                        </div>
                    </div>

                    <!-- To Status Selection -->
                    <div class="slds-form-element">
                        <label class="slds-form-element__label" for="toStatusSelect">
                            <abbr class="slds-required">*</abbr>To Status
                        </label>
                        <div class="slds-form-element__control">
                            <select
                                id="toStatusSelect"
                                class="slds-select"
                                value={newTransition.toStatusId}
                                onchange={handleToStatusChange}
                            >
                                <template for:each={statusOptions} for:item="option">
                                    <option key={option.value} value={option.value}>{option.label}</option>
                                </template>
                            </select>
                        </div>
                    </div>

                    <!-- Record Status Field (Optional) -->
                    <div class="slds-form-element">
                        <label class="slds-form-element__label" for="recordStatus">
                            Record Status
                        </label>
                        <div class="slds-form-element__control">
                            <input
                                id="recordStatus"
                                class="slds-input"
                                type="text"
                                placeholder="Optional status indicator"
                                value={newTransition.recordStatus}
                                onchange={handleRecordStatusChange}
                            />
                        </div>
                    </div>

                    <!-- Buttons -->
                    <div class="slds-var-m-top_medium">
                        <button
                            class="slds-button slds-button_brand"
                            type="button"
                            onclick={handleCreateTransition}
                            disabled={isLoading}
                        >
                            <template if:false={isLoading}>Create Transition</template>
                            <template if:true={isLoading}>Creating...</template>
                        </button>
                        <button
                            class="slds-button slds-button_neutral slds-var-m-left_small"
                            type="button"
                            onclick={toggleForm}
                        >
                            Cancel
                        </button>
                    </div>
                </form>
            </div>
        </template>
    </div>
</template>
