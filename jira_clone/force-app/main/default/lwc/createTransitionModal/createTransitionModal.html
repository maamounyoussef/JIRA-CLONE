<template>
    <template if:true={isOpen}>
        <div class="modal-overlay" onclick={handleOverlayClick}>
            <div class="modal-content" onclick={handleStopPropagation}>
                <!-- Modal Header -->
                <h2 class="modal-title">Create Transition</h2>

                <!-- Status Flow Display -->
                <div class="transition-info">
                    <span class="status-badge from">{fromStatus.name}</span>
                    <span class="arrow">→</span>
                    <span class="status-badge to">{toStatus.name}</span>
                </div>

                <!-- Transition Name Input -->
                <lightning-input
                    type="text"
                    label="Transition Name"
                    placeholder="Enter transition name (e.g., Start Work)"
                    value={transitionName}
                    onchange={handleInputChange}
                    class="modal-input"
                ></lightning-input>

                <!-- Action Buttons -->
                <div class="modal-actions">
                    <lightning-button
                        variant="neutral"
                        label="Cancel"
                        onclick={handleCancel}
                    ></lightning-button>
                    <lightning-button
                        variant="brand"
                        label="Create Transition"
                        onclick={handleCreateTransition}
                        disabled={isCreating}
                    ></lightning-button>
                </div>
            </div>
        </div>
    </template>
</template>
