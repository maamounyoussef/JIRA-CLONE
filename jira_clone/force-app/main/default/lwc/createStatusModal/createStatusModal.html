<template>
    <template if:true={isOpen}>
        <div class="modal-backdrop" onclick={closeModal}></div>
        <div class="modal-container">
            <div class="modal-header">
                <h2 class="modal-title">Create New Status</h2>
                <button class="close-button" onclick={closeModal} title="Close">
                    ✕
                </button>
            </div>

            <div class="modal-body">
                <div class="form-group">
                    <label for="statusNameInput" class="form-label">Status Name</label>
                    <input
                        id="statusNameInput"
                        type="text"
                        class="form-input"
                        placeholder="Enter status name"
                        value={statusName}
                        onchange={handleStatusNameChange}
                        onkeypress={handleKeyPress}
                        disabled={isLoading}
                    />
                </div>

                <template if:true={errorMessage}>
                    <div class="error-message">
                        <span class="error-icon">⚠</span>
                        <span>{errorMessage}</span>
                    </div>
                </template>
            </div>

            <div class="modal-footer">
                <button
                    class="btn btn-secondary"
                    onclick={closeModal}
                    disabled={isLoading}
                >
                    Cancel
                </button>
                <button
                    class="btn btn-primary"
                    onclick={handleCreate}
                    disabled={isLoading}
                >
                    <template if:false={isLoading}>Create Status</template>
                    <template if:true={isLoading}>Creating...</template>
                </button>
            </div>
        </div>
    </template>
</template>
