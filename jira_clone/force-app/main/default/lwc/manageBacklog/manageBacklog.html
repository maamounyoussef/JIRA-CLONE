<template>

    <!-- Error Message -->
    <template if:true={errorMessage}>
        <div class="error-box">
            <lightning-icon icon-name="utility:error" size="x-small" variant="error"></lightning-icon>
            <span>{errorMessage}</span>
            <lightning-button label="Dismiss" variant="bare" onclick={clearError}></lightning-button>
        </div>
    </template>

    <!-- Bulk Delete Bar -->
    <template if:true={hasSelectedTickets}>
        <div class="bulk-bar">
            <span>{selectedCount} ticket(s) selected</span>
            <lightning-button label="Delete Selected" variant="destructive" onclick={handleBulkDelete}></lightning-button>
            <lightning-button label="Cancel" onclick={handleClearSelection}></lightning-button>
        </div>
    </template>

    <!-- Confirmation Dialog (sprint-level actions only) -->
    <template if:true={showConfirmDialog}>
        <section role="dialog" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <div class="slds-modal__content slds-p-around_medium">
                    <p>{confirmMessage}</p>
                </div>
                <div class="slds-modal__footer">
                    <lightning-button label="Cancel"  onclick={handleCancelConfirm}></lightning-button>
                    <lightning-button label="Confirm" variant="destructive" onclick={handleConfirm}></lightning-button>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <!-- Create Ticket Modal -->
    <template if:true={showCreateTicketModal}>
        <section role="dialog" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <h2>Create Ticket</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <lightning-input label="Name *"        value={newTicket.name}        data-field="name"          onchange={handleNewTicketChange}></lightning-input>
                    <lightning-input label="Summary"       value={newTicket.summary}      data-field="summary"       onchange={handleNewTicketChange}></lightning-input>
                    <lightning-input label="Description"   value={newTicket.description}  data-field="description"   onchange={handleNewTicketChange}></lightning-input>
                    <lightning-input type="number" label="Story Points" value={newTicket.storyPoint} data-field="storyPoint" onchange={handleNewTicketChange}></lightning-input>
                    <lightning-combobox label="Ticket Type *" value={newTicket.ticketTypeId}   options={ticketTypeOptions} data-field="ticketTypeId"   onchange={handleNewTicketChange}></lightning-combobox>
                    <lightning-combobox label="State *"       value={newTicket.currentStateId} options={statusOptions}     data-field="currentStateId" onchange={handleNewTicketChange}></lightning-combobox>
                    <lightning-combobox label="Priority"      value={newTicket.priority}       options={priorityOptions}   data-field="priority"       onchange={handleNewTicketChange}></lightning-combobox>
                    <template if:true={modalError}>
                        <p class="modal-error">{modalError}</p>
                    </template>
                </div>
                <div class="slds-modal__footer">
                    <lightning-button label="Cancel" onclick={handleCloseCreateTicketModal}></lightning-button>
                    <lightning-button label="Create" variant="brand" onclick={handleCreateTicketSubmit}></lightning-button>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <!-- Create / Edit Sprint Modal -->
    <template if:true={showSprintModal}>
        <section role="dialog" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <h2>{sprintModalTitle}</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <lightning-input label="Name *"            value={sprintForm.name}      data-field="name"      onchange={handleSprintFormChange}></lightning-input>
                    <lightning-input type="number" label="Duration (days) *" value={sprintForm.duration}  data-field="duration"  onchange={handleSprintFormChange}></lightning-input>
                    <lightning-input type="date"   label="Start Date *"      value={sprintForm.startDate} data-field="startDate" onchange={handleSprintFormChange}></lightning-input>
                    <lightning-input label="Goal *"            value={sprintForm.goal}      data-field="goal"      onchange={handleSprintFormChange}></lightning-input>
                    <template if:true={modalError}>
                        <p class="modal-error">{modalError}</p>
                    </template>
                </div>
                <div class="slds-modal__footer">
                    <lightning-button label="Cancel" onclick={handleCloseSprintModal}></lightning-button>
                    <lightning-button label={sprintModalSubmitLabel} variant="brand" onclick={handleSprintSubmit}></lightning-button>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <!-- ══════════════════════════════════════════
         MAIN LAYOUT
         ══════════════════════════════════════════ -->
    <div class="page-wrapper">

        <!-- ── WORK CONTAINER (Sprints) ─────────────────────────────── -->
        <div class="work-container">
            <h1 class="section-title">Work</h1>

            <template if:true={isLoading}>
                <lightning-spinner alternative-text="Loading..."></lightning-spinner>
            </template>

            <template for:each={sprints} for:item="sprint">
                <div key={sprint.Id} class="sprint-container">

                    <!-- Sprint Header -->
                    <div class="sprint-header">
                        <span class="sprint-name">{sprint.Name}</span>
                        <span class="sprint-dates">{sprint.StartDate__c} → {sprint.endDate}</span>
                        <span class="sprint-status-badge">{sprint.RecordStatus__c}</span>

                        <template if:false={sprint.isComplete}>
                            <lightning-button label="Start"    variant="brand"     data-sprint-id={sprint.Id} onclick={handleStartSprint}></lightning-button>
                        </template>
                        <lightning-button label="Complete" variant="neutral"   data-sprint-id={sprint.Id} onclick={handleCompleteSprint}></lightning-button>
                        <lightning-button label="Edit"     variant="neutral"   data-sprint-id={sprint.Id} onclick={handleEditSprint}></lightning-button>
                        <lightning-button label="Delete"   variant="destructive" data-sprint-id={sprint.Id} onclick={handleDeleteSprint}></lightning-button>
                        <lightning-button label="+ Ticket" variant="neutral"   data-sprint-id={sprint.Id} onclick={handleOpenCreateTicketForSprint}></lightning-button>
                    </div>

                    <template if:true={sprint.Goal__c}>
                        <p class="sprint-goal">{sprint.Goal__c}</p>
                    </template>

                    <!-- Sprint Tickets via aoTicketItem -->
                    <template for:each={sprint.tickets} for:item="ticket">
                        <c-ao-ticket-item
                            key={ticket.Id}
                            ticket={ticket}
                            status-options={statusOptions}
                            member-options={memberOptions}
                            priority-options={priorityOptions}
                            onticketselect={handleTicketSelect}
                            onticketdeleted={handleTicketDeleted}
                            onticketupdated={handleTicketUpdated}>
                        </c-ao-ticket-item>
                    </template>

                    <template if:false={sprint.hasTickets}>
                        <p class="empty-sprint">No tickets in this sprint.</p>
                    </template>
                </div>
            </template>

            <template if:false={hasSprints}>
                <p class="empty-msg">No active sprints.</p>
            </template>
        </div>

        <!-- ── BACKLOG CONTAINER ─────────────────────────────────────── -->
        <div class="backlog-container">
            <div class="backlog-header">
                <h1 class="section-title">Backlog</h1>
                <lightning-button label="+ Sprint" variant="neutral" onclick={handleOpenCreateSprint}></lightning-button>
                <lightning-button label="+ Ticket" variant="brand"   onclick={handleOpenCreateTicketForBacklog}></lightning-button>
            </div>

            <template if:true={isLoading}>
                <lightning-spinner alternative-text="Loading..."></lightning-spinner>
            </template>

            <!-- Backlog Tickets via aoTicketItem -->
            <template for:each={backlogTickets} for:item="ticket">
                <c-ao-ticket-item
                    key={ticket.Id}
                    ticket={ticket}
                    status-options={statusOptions}
                    member-options={memberOptions}
                    priority-options={priorityOptions}
                    onticketselect={handleTicketSelect}
                    onticketdeleted={handleTicketDeleted}
                    onticketupdated={handleTicketUpdated}>
                </c-ao-ticket-item>
            </template>

            <template if:false={hasBacklogTickets}>
                <p class="empty-msg">No tickets in backlog.</p>
            </template>
        </div>

    </div>
</template>
