<template>

    <!-- Error Message -->
    <template if:true={errorMessage}>
        <div class="error-box">
            <lightning-icon icon-name="utility:error" size="x-small" variant="error"></lightning-icon>
            <span>{errorMessage}</span>
            <c-ao-btn label="Dismiss" variant="ghost" onclick={clearError}></c-ao-btn>
        </div>
    </template>

    <!-- Bulk Delete Bar -->
    <template if:true={hasSelectedTickets}>
        <div class="bulk-bar">
            <span>{selectedCount} ticket(s) selected</span>
            <c-ao-btn label="Delete Selected" variant="danger" onclick={handleBulkDelete}></c-ao-btn>
            <c-ao-btn label="Cancel" variant="ghost" onclick={handleClearSelection}></c-ao-btn>
        </div>
    </template>

    <!-- Confirmation Dialog -->
    <template if:true={showConfirmDialog}>
        <section role="dialog" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <div class="slds-modal__content slds-p-around_medium">
                    <p>{confirmMessage}</p>
                </div>
                <div class="slds-modal__footer">
                    <c-ao-btn label="Cancel"  variant="ghost"  onclick={handleCancelConfirm}></c-ao-btn>
                    <c-ao-btn label="Confirm" variant="danger" onclick={handleConfirm}></c-ao-btn>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <!-- Create / Edit Sprint Modal -->
    <template if:true={showSprintModal}>
        <section role="dialog" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <h2>{sprintModalTitle}</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <c-ao-input label="Name"            required value={sprintForm.name}      data-field="name"      onchange={handleSprintFormChange}></c-ao-input>
                    <c-ao-input label="Duration (days)" required type="number" value={sprintForm.duration}  data-field="duration"  onchange={handleSprintFormChange}></c-ao-input>
                    <c-ao-input label="Start Date"      required type="date"   value={sprintForm.startDate} data-field="startDate" onchange={handleSprintFormChange}></c-ao-input>
                    <c-ao-input label="Goal"            required value={sprintForm.goal}      data-field="goal"      onchange={handleSprintFormChange}></c-ao-input>
                    <template if:true={modalError}>
                        <p class="modal-error">{modalError}</p>
                    </template>
                </div>
                <div class="slds-modal__footer">
                    <c-ao-btn label="Cancel"                 variant="ghost"   onclick={handleCloseSprintModal}></c-ao-btn>
                    <c-ao-btn label={sprintModalSubmitLabel} variant="primary" onclick={handleSprintSubmit}></c-ao-btn>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <!-- ══════════════════════════════════════════
         MAIN LAYOUT
         ══════════════════════════════════════════ -->
    <div class="page-wrapper" ondragstart={handlePageDragStart} ondragend={handlePageDragEnd}>

        <!-- ── WORK CONTAINER (Sprints) ─────────────────────────────── -->
        <div class="work-container">
            <h1 class="section-title">Work</h1>

            <template if:true={showSprintTicketModal}>
                <c-ao-create-ticket-modal
                    sprint-id={_activeSprintId}
                    status-options={statusOptions}
                    ticket-type-options={ticketTypeOptions}
                    priority-options={priorityOptions}
                    onticketcreated={handleSprintTicketCreated}
                    oncancel={handleCreateTicketCancel}>
                </c-ao-create-ticket-modal>
            </template>

            <template if:true={isLoading}>
                <lightning-spinner alternative-text="Loading..."></lightning-spinner>
            </template>

            <template for:each={sprints} for:item="sprint">
                <div key={sprint.Id} class={sprint.dropTargetClass} data-sprint-id={sprint.Id}
                     ondragenter={handleDragEnterSprint}
                     ondragleave={handleDragLeaveSprint}
                     ondragover={handleDragOver}
                     ondrop={handleDropOnSprint}>

                    <!-- Sprint Header -->
                    <div class="sprint-header">
                        <button class="toggle-btn" data-sprint-id={sprint.Id} onclick={handleToggle}>
                            <lightning-icon icon-name={sprint.chevronIcon} size="x-small"></lightning-icon>
                        </button>
                        <span class="sprint-name">{sprint.Name}</span>
                        <span class="sprint-dates">{sprint.StartDate__c} → {sprint.endDate}</span>
                        <span class="sprint-status-badge">{sprint.RecordStatus__c}</span>
                        <template if:false={sprint.isComplete}>
                            <c-ao-btn label="Start"    variant="primary"   data-sprint-id={sprint.Id} onclick={handleSprintStart}></c-ao-btn>
                        </template>
                        <c-ao-btn label="Complete" variant="secondary" data-sprint-id={sprint.Id} onclick={handleSprintComplete}></c-ao-btn>
                        <c-ao-btn label="Edit"     variant="secondary" data-sprint-id={sprint.Id} onclick={handleSprintEdit}></c-ao-btn>
                        <c-ao-btn label="Delete"   variant="danger"    data-sprint-id={sprint.Id} onclick={handleSprintDelete}></c-ao-btn>
                        <c-ao-btn label="+ Ticket" variant="ghost"     data-sprint-id={sprint.Id} onclick={handleSprintAddTicket}></c-ao-btn>
                    </div>

                    <!-- Collapsible Body -->
                    <template if:true={sprint.isExpanded}>
                        <template if:true={sprint.Goal__c}>
                            <p class="sprint-goal">{sprint.Goal__c}</p>
                        </template>

                        <template if:true={sprint.isLoadingTickets}>
                            <lightning-spinner alternative-text="Loading tickets..." size="small"></lightning-spinner>
                        </template>

                        <template for:each={sprint.tickets} for:item="ticket">
                            <c-ao-ticket-item
                                key={ticket.Id}
                                ticket={ticket}
                                status-options={statusOptions}
                                member-options={memberOptions}
                                priority-options={priorityOptions}
                                project-id={_projectId}
                                epics={epics}
                                onticketselect={handleTicketSelect}
                                onticketdeleted={handleSprintTicketDeleted}
                                onticketsummaryupdated={handleTicketSummaryUpdated}
                                onticketpriorityupdated={handleTicketPriorityUpdated}
                                onticketstateupdated={handleTicketStateUpdated}
                                oncreateepicforticket={handleCreateEpicForTicketModal}
                                onupdateticket={handleUpdateTicket}>
                            </c-ao-ticket-item>
                        </template>

                        <template if:false={sprint.hasTickets}>
                            <template if:false={sprint.isLoadingTickets}>
                                <p class="empty-sprint">No tickets in this sprint.</p>
                            </template>
                        </template>

                        <!-- Pagination Footer -->
                        <div class="pagination-footer">
                            <c-ao-btn
                                icon-name="utility:chevronleft"
                                variant="secondary"
                                size="sm"
                                title="Previous page"
                                disabled={sprint.isFirstPage}
                                data-sprint-id={sprint.Id}
                                onclick={handleSprintPrevPage}>
                            </c-ao-btn>
                            <span class="page-indicator">Page {sprint.currentPage}</span>
                            <c-ao-btn
                                icon-name="utility:chevronright"
                                variant="secondary"
                                size="sm"
                                title="Next page"
                                disabled={sprint.isLastPage}
                                data-sprint-id={sprint.Id}
                                onclick={handleSprintNextPage}>
                            </c-ao-btn>
                        </div>
                    </template>

                </div>
            </template>

            <template if:false={hasSprints}>
                <p class="empty-msg">No active sprints.</p>
            </template>
        </div>

        <!-- ── BACKLOG CONTAINER ─────────────────────────────────────── -->
        <div class={backlogDropClass}
             ondragenter={handleDragEnterBacklog}
             ondragleave={handleDragLeaveBacklog}
             ondragover={handleDragOver}
             ondrop={handleDropOnBacklog}>
            <div class="backlog-header">
                <h1 class="section-title">Backlog</h1>
                <c-ao-btn label="+ Sprint" variant="secondary" onclick={handleOpenCreateSprint}></c-ao-btn>
                <c-ao-btn label="+ Ticket" variant="primary"   onclick={handleOpenCreateTicketForBacklog}></c-ao-btn>
            </div>

            <template if:true={showBacklogTicketModal}>
                <c-ao-create-ticket-modal
                    status-options={statusOptions}
                    ticket-type-options={ticketTypeOptions}
                    priority-options={priorityOptions}
                    onticketcreated={handleBacklogTicketCreated}
                    oncancel={handleCreateTicketCancel}>
                </c-ao-create-ticket-modal>
            </template>

            <template if:true={backlogIsLoading}>
                <lightning-spinner alternative-text="Loading tickets..." size="small"></lightning-spinner>
            </template>

            <template for:each={backlogTickets} for:item="ticket">
                <c-ao-ticket-item
                    key={ticket.Id}
                    ticket={ticket}
                    status-options={statusOptions}
                    member-options={memberOptions}
                    priority-options={priorityOptions}
                    project-id={_projectId}
                    epics={epics}
                    onticketselect={handleTicketSelect}
                    onticketdeleted={handleBacklogTicketDeleted}
                    onticketsummaryupdated={handleTicketSummaryUpdated}
                    onticketpriorityupdated={handleTicketPriorityUpdated}
                    onticketstateupdated={handleTicketStateUpdated}
                    oncreateepicforticket={handleCreateEpicForTicketModal}
                    onupdateticket={handleUpdateTicket}>
                </c-ao-ticket-item>
            </template>

            <template if:false={hasBacklogTickets}>
                <template if:false={backlogIsLoading}>
                    <p class="empty-msg">No tickets in backlog.</p>
                </template>
            </template>

            <!-- Backlog Pagination Footer -->
            <div class="pagination-footer">
                <c-ao-btn
                    icon-name="utility:chevronleft"
                    variant="secondary"
                    size="sm"
                    title="Previous page"
                    disabled={backlogIsFirstPage}
                    onclick={handleBacklogPrevPage}>
                </c-ao-btn>
                <span class="page-indicator">{backlogOffsetLabel}</span>
                <c-ao-btn
                    icon-name="utility:chevronright"
                    variant="secondary"
                    size="sm"
                    title="Next page"
                    disabled={backlogIsLastPage}
                    onclick={handleBacklogNextPage}>
                </c-ao-btn>
            </div>
        </div>

    </div>
</template>
