<template>
    <div class="workflow-visualizer-container" style="--start-point-radius: {startPointRadius}px; --end-point-radius: {endPointRadius}px; --line-width: {config.lineWidth}px; --line-hover-width: {config.lineHoverWidth}px; --line-dasharray: {config.lineDashArray}; --rect-stroke-width: {config.rectStrokeWidth}px; --rect-stroke-opacity: {config.rectStrokeOpacity}; --rect-hover-stroke-opacity: {config.rectHoverStrokeOpacity}; --arrow-length: {config.arrowLength}px; --arrow-width: {config.arrowWidth}px; --label-offset: {config.labelOffset}px; --curve-factor: {config.curveFactor}; --max-curve-height: {config.maxCurveHeight}px; --rect-radius: {config.rectRadius}px; --legend-badge-width: 44px; --legend-badge-height: 20px;">
        <!-- Toolbar -->
        <div class="toolbar">
            <lightning-button
                variant="brand"
                label="Create Status"
                onclick={openCreateStatusModal}
                icon-name="utility:add"
            ></lightning-button>
            <span class="toolbar-info">
                <template if:true={selectedFromStatus}>
                    <strong>From: {selectedFromStatus.name}</strong>
                    <template if:true={selectedToStatus}>
                        → To: {selectedToStatus.name}
                    </template>
                </template>
                <template if:false={selectedFromStatus}>
                    Click two statuses to create a transition
                </template>
            </span>
        </div>

        <!-- Legend for Transition Types -->
        <div class="legend-container">
            <div class="legend-title">Transition Types:</div>
            <div class="legend-items">
                <div class="legend-item">
                    <div class="legend-badge active"></div>
                    <span class="legend-label">Active Transition</span>
                </div>
                <div class="legend-item">
                    <div class="legend-badge pending"></div>
                    <span class="legend-label">Pending Transition</span>
                </div>
            </div>
        </div>

        <template if:true={sortedStatuses}>
            <!-- SVG Canvas for Everything -->
            <svg class="workflow-svg" viewBox={svgViewBox} xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
                <defs>
                    <!-- Status gradient -->
                    <linearGradient id="statusGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#f8fafc;stop-opacity:1" />
                    </linearGradient>
                    
                    <!-- marker defs removed: explicit arrow polygons are used instead -->
                </defs>

                <!-- Active Transition Lines -->
                <template for:each={activeTransitionLines} for:item="line">
                    <g key={line.id} class={line.groupClass} data-line-id={line.id} onclick={handleTransitionClick}>
                        <!-- Connection circle at start point -->
                        <circle
                            class="transition-start-point"
                            cx={line.startX}
                            cy={line.startY}
                            r={startPointRadius}
                        ></circle>
                        
                        <!-- Transition line -->
                        <path
                            class={line.lineClass}
                            d={line.path}
                            fill="none"
                        ></path>

                        <!-- Explicit arrow polygon at the end -->
                        <path
                            class={line.arrowClass}
                            d={line.arrowPath}
                        ></path>
                        
                        <!-- Connection circle at end point -->
                        <circle
                            class="transition-end-point"
                            cx={line.endX}
                            cy={line.endY}
                            r={endPointRadius}
                        ></circle>
                        
                        <!-- Transition Name Label -->
                        <text
                            class="transition-label"
                            x={line.nameMidX}
                            y={line.nameMidY}
                            text-anchor="middle"
                        >
                            {line.name}
                        </text>
                    </g>
                </template>

                <!-- Pending Transition Lines -->
                <template for:each={pendingTransitionLines} for:item="line">
                    <g key={line.id} class={line.groupClass} data-line-id={line.id} onclick={handleTransitionClick}>
                        <!-- Connection circle at start point -->
                        <circle
                            class="transition-start-point"
                            cx={line.startX}
                            cy={line.startY}
                            r={startPointRadius}
                        ></circle>
                        
                        <!-- Transition line -->
                        <path
                            class={line.lineClass}
                            d={line.path}
                            fill="none"
                        ></path>

                        <!-- Explicit arrow polygon at the end -->
                        <path
                            class={line.arrowClass}
                            d={line.arrowPath}
                        ></path>
                        
                        <!-- Connection circle at end point -->
                        <circle
                            class="transition-end-point"
                            cx={line.endX}
                            cy={line.endY}
                            r={endPointRadius}
                        ></circle>
                        
                        <!-- Transition Name Label -->
                        <text
                            class="transition-label"
                            x={line.nameMidX}
                            y={line.nameMidY}
                            text-anchor="middle"
                        >
                            {line.name}
                        </text>
                    </g>
                </template>

                <!-- Status Rectangles -->
                <template for:each={statusesWithSVGData} for:item="status">
                    <g 
                        key={status.id} 
                        class={status.groupClass} 
                        data-status-id={status.id}
                        onclick={handleStatusClick}
                    >
                        <rect
                            class="status-rectangle-svg"
                            x={status.x}
                            y={status.y}
                            width={status.width}
                            height={status.height}
                            rx={rectRadius}
                        ></rect>
                        <text
                            class="status-text-svg"
                            x={status.textX}
                            y={status.textY}
                            text-anchor="middle"
                            dominant-baseline="middle"
                        >
                            {status.name}
                        </text>
                    </g>
                </template>
            </svg>
        </template>
        
        <template if:false={sortedStatuses}>
            <div class="slds-text-color_weak slds-m-around_medium">
                No workflow data available
            </div>
        </template>

        <!-- Inline Create Status Modal -->
        <template if:true={showCreateModal}>
            <div class="modal-backdrop" onclick={closeCreateModal}></div>
            <div class="modal-container">
                <div class="modal-header">
                    <h2 class="modal-title">Create New Status</h2>
                    <lightning-button-icon icon-name="utility:close" alternative-text="Close" class="close-button" onclick={closeCreateModal}></lightning-button-icon>
                </div>

                <div class="modal-body">
                    <lightning-input
                        type="text"
                        label="Status Name"
                        value={newStatusName}
                        onchange={handleStatusNameChange}
                        onkeypress={handleModalKeyPress}
                        class="modal-input"
                        disabled={isCreatingStatus}
                        placeholder="Enter Status Name"
                    ></lightning-input>

                    <template if:true={createStatusErrorMessage}>
                        <div class="error-message">
                            <span class="error-icon">⚠</span>
                            <span>{createStatusErrorMessage}</span>
                        </div>
                    </template>
                </div>

                <div class="modal-footer">
                    <lightning-button variant="neutral" label="Cancel" onclick={closeCreateModal} disabled={isCreatingStatus}></lightning-button>
                    <lightning-button variant="brand" label={createStatusButtonLabel} onclick={handleCreateSubmit} disabled={isCreatingStatus}></lightning-button>
                </div>
            </div>
        </template>

        <!-- Create Transition Modal (inlined from createTransitionModal component) -->
        <template if:true={showCreateTransitionModal}>
            <div class="transition-modal-overlay" onclick={handleCloseCreateTransitionModal}>
                <div class="transition-modal-content" onclick={stopPropagation}>
                    <!-- Modal Header -->
                    <h2 class="transition-modal-title">Create Transition</h2>

                    <!-- Status Flow Display -->
                    <template if:true={selectedFromStatus}>
                        <div class="transition-info">
                            <span class="status-badge from">{selectedFromStatus.name}</span>
                            <span class="arrow">→</span>
                            <span class="status-badge to">{selectedToStatus.name}</span>
                        </div>
                    </template>

                    <!-- Error Message -->
                    <template if:true={createTransitionErrorMessage}>
                        <div class="error-message">
                            <span class="error-icon">⚠</span>
                            <span>{createTransitionErrorMessage}</span>
                        </div>
                    </template>

                    <!-- Transition Name Input -->
                    <lightning-input
                        type="text"
                        label="Transition Name"
                        placeholder="Enter transition name (e.g., Start Work)"
                        value={newTransitionName}
                        onchange={handleTransitionNameChange}
                        class="modal-input"
                        disabled={isCreatingTransition}
                    ></lightning-input>

                    <!-- Action Buttons -->
                    <div class="modal-actions">
                        <lightning-button
                            variant="neutral"
                            label="Cancel"
                            onclick={handleCloseCreateTransitionModal}
                            disabled={isCreatingTransition}
                        ></lightning-button>
                        <lightning-button
                            variant="brand"
                            label="Create Transition"
                            onclick={handleCreateTransitionSubmit}
                            disabled={isCreatingTransition}
                        ></lightning-button>
                    </div>
                </div>
            </div>
        </template>

        <!-- Transition Detail Panel -->
        <template if:true={showTransitionDetail}>
            <div class="transition-detail-panel">
                <!-- Sticky Header — Close button always visible -->
                <div class="panel-header">
                    <h2 class="panel-header-title">
                        <lightning-icon icon-name="utility:flow" size="small"></lightning-icon>
                        Transition Detail
                    </h2>
                    <div class="panel-header-actions">
                        <template if:true={transitionCanActivate}>
                            <lightning-button
                                variant="success"
                                label="Activate"
                                onclick={handleActivateTransition}
                                icon-name="utility:check"
                                disabled={transitionIsActivating}
                            ></lightning-button>
                        </template>
                        <lightning-button
                            variant="destructive"
                            label="Delete"
                            onclick={handleDeleteTransition}
                            icon-name="utility:delete"
                            disabled={transitionIsDeleting}
                        ></lightning-button>
                        <lightning-button-icon
                            icon-name="utility:close"
                            alternative-text="Close"
                            variant="border-filled"
                            onclick={handleCloseTransitionDetail}
                            class="close-button"
                        ></lightning-button-icon>
                    </div>
                </div>

                <!-- Scrollable Body -->
                <div class="panel-body">
                    <!-- Loading Indicator -->
                    <template if:true={transitionIsLoading}>
                        <div class="slds-m-around_large slds-align_absolute-center" style="min-height: 200px;">
                            <lightning-spinner alternative-text="Loading..."></lightning-spinner>
                        </div>
                    </template>

                    <!-- Error Message -->
                    <template if:true={transitionErrorMessage}>
                        <div class="error-message">
                            <span class="error-icon">⚠</span>
                            <span>{transitionErrorMessage}</span>
                        </div>
                    </template>

                    <!-- Success Message -->
                    <template if:true={transitionSuccessMessage}>
                        <div style="padding: 16px 24px;">
                            <lightning-alert variant="success" title="Success">{transitionSuccessMessage}</lightning-alert>
                        </div>
                    </template>

                    <!-- Detail Fields -->
                    <template if:true={transitionData}>
                        <div class="transition-detail-container">
                            <!-- Transition Name -->
                            <div class="detail-field">
                                <dt class="detail-label">
                                    <lightning-icon icon-name="utility:text" size="x-small" alternative-text="Name"></lightning-icon>
                                    <span>Name</span>
                                </dt>
                                <dd class="detail-value">
                                    <strong>{transitionData.name}</strong>
                                </dd>
                            </div>

                            <!-- Transition ID -->
                            <div class="detail-field">
                                <dt class="detail-label">
                                    <lightning-icon icon-name="utility:unicode" size="x-small" alternative-text="ID"></lightning-icon>
                                    <span>ID</span>
                                </dt>
                                <dd class="detail-value">
                                    <code class="id-value">{transitionData.id}</code>
                                </dd>
                            </div>

                            <!-- From Status -->
                            <div class="detail-field">
                                <dt class="detail-label">
                                    <lightning-icon icon-name="utility:forward" size="x-small" alternative-text="From"></lightning-icon>
                                    <span>From Status</span>
                                </dt>
                                <dd class="detail-value">
                                    <span class="status-badge from">{fromTransitionStatusName}</span>
                                </dd>
                            </div>

                            <!-- To Status -->
                            <div class="detail-field">
                                <dt class="detail-label">
                                    <lightning-icon icon-name="utility:forward" size="x-small" alternative-text="To"></lightning-icon>
                                    <span>To Status</span>
                                </dt>
                                <dd class="detail-value">
                                    <span class="status-badge to">{toTransitionStatusName}</span>
                                </dd>
                            </div>

                            <!-- Record Status -->
                            <div class="detail-field">
                                <dt class="detail-label">
                                    <lightning-icon icon-name="utility:record" size="x-small" alternative-text="Status"></lightning-icon>
                                    <span>Record Status</span>
                                </dt>
                                <dd class="detail-value">
                                    <lightning-badge label={transitionRecordStatus}></lightning-badge>
                                </dd>
                            </div>

                            <!-- Created Date -->
                            <div class="detail-field">
                                <dt class="detail-label">
                                    <lightning-icon icon-name="utility:date_input" size="x-small" alternative-text="Created"></lightning-icon>
                                    <span>Created Date</span>
                                </dt>
                                <dd class="detail-value">
                                    {formattedTransitionCreatedDate}
                                </dd>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </template>
    </div>
</template>
