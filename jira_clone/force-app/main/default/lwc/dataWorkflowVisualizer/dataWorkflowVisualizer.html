<template>
    <div class="workflow-visualizer-container" style="--start-point-radius: {startPointRadius}px; --end-point-radius: {endPointRadius}px; --line-width: {config.lineWidth}px; --line-hover-width: {config.lineHoverWidth}px; --line-dasharray: {config.lineDashArray}; --rect-stroke-width: {config.rectStrokeWidth}px; --rect-stroke-opacity: {config.rectStrokeOpacity}; --rect-hover-stroke-opacity: {config.rectHoverStrokeOpacity}; --arrow-length: {config.arrowLength}px; --arrow-width: {config.arrowWidth}px; --label-offset: {config.labelOffset}px; --curve-factor: {config.curveFactor}; --max-curve-height: {config.maxCurveHeight}px; --rect-radius: {config.rectRadius}px; --legend-badge-width: 44px; --legend-badge-height: 20px;">
        <!-- Toolbar -->
        <div class="toolbar">
            <lightning-button
                variant="brand"
                label="Create Status"
                onclick={openCreateStatusModal}
                icon-name="utility:add"
            ></lightning-button>
            <span class="toolbar-info">
                <template if:true={selectedFromStatus}>
                    <strong>From: {selectedFromStatus.name}</strong>
                    <template if:true={selectedToStatus}>
                        → To: {selectedToStatus.name}
                    </template>
                </template>
                <template if:false={selectedFromStatus}>
                    Click two statuses to create a transition
                </template>
            </span>
        </div>

        <!-- Legend for Transition Types -->
        <div class="legend-container">
            <div class="legend-title">Transition Types:</div>
            <div class="legend-items">
                <div class="legend-item">
                    <div class="legend-badge active"></div>
                    <span class="legend-label">Active Transition</span>
                </div>
                <div class="legend-item">
                    <div class="legend-badge pending"></div>
                    <span class="legend-label">Pending Transition</span>
                </div>
            </div>
        </div>

        <template if:true={sortedStatuses}>
            <!-- SVG Canvas for Everything -->
            <svg class="workflow-svg" viewBox={svgViewBox} xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
                <defs>
                    <!-- Status gradient -->
                    <linearGradient id="statusGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#dbeafe;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#bfdbfe;stop-opacity:1" />
                    </linearGradient>
                    
                    <!-- marker defs removed: explicit arrow polygons are used instead -->
                </defs>

                <!-- Active Transition Lines -->
                <template for:each={activeTransitionLines} for:item="line">
                    <g key={line.id} class="transition-line-group active-transition" data-line-id={line.id} onclick={handleTransitionClick}>
                        <!-- Connection circle at start point -->
                        <circle
                            class="transition-start-point"
                            cx={line.startX}
                            cy={line.startY}
                            r={startPointRadius}
                        ></circle>
                        
                        <!-- Transition line -->
                        <path
                            class="transition-line"
                            d={line.path}
                            fill="none"
                        ></path>

                        <!-- Explicit arrow polygon at the end -->
                        <path
                            class="transition-arrow"
                            d={line.arrowPath}
                        ></path>
                        
                        <!-- Connection circle at end point -->
                        <circle
                            class="transition-end-point"
                            cx={line.endX}
                            cy={line.endY}
                            r={endPointRadius}
                        ></circle>
                        
                        <!-- Status labels -->
                        <text
                            class="transition-label-start"
                            x={line.startX}
                            y={line.startLabelY}
                            text-anchor="middle"
                        >
                            {line.fromStatus}
                        </text>
                        <text
                            class="transition-label-end"
                            x={line.endX}
                            y={line.endLabelY}
                            text-anchor="middle"
                        >
                            {line.toStatus}
                        </text>
                    </g>
                </template>

                <!-- Pending Transition Lines -->
                <template for:each={pendingTransitionLines} for:item="line">
                    <g key={line.id} class="transition-line-group pending-transition" data-line-id={line.id} onclick={handleTransitionClick}>
                        <!-- Connection circle at start point -->
                        <circle
                            class="transition-start-point"
                            cx={line.startX}
                            cy={line.startY}
                            r={startPointRadius}
                        ></circle>
                        
                        <!-- Transition line -->
                        <path
                            class="transition-line pending"
                            d={line.path}
                            fill="none"
                        ></path>

                        <!-- Explicit arrow polygon at the end -->
                        <path
                            class="transition-arrow pending"
                            d={line.arrowPath}
                        ></path>
                        
                        <!-- Connection circle at end point -->
                        <circle
                            class="transition-end-point"
                            cx={line.endX}
                            cy={line.endY}
                            r={endPointRadius}
                        ></circle>
                        
                        <!-- Status labels -->
                        <text
                            class="transition-label-start"
                            x={line.startX}
                            y={line.startLabelY}
                            text-anchor="middle"
                        >
                            {line.fromStatus}
                        </text>
                        <text
                            class="transition-label-end"
                            x={line.endX}
                            y={line.endLabelY}
                            text-anchor="middle"
                        >
                            {line.toStatus}
                        </text>
                    </g>
                </template>

                <!-- Status Rectangles -->
                <template for:each={statusesWithSVGData} for:item="status">
                    <g 
                        key={status.id} 
                        class={status.groupClass} 
                        data-status-id={status.id}
                        onclick={handleStatusClick}
                    >
                        <rect
                            class="status-rectangle-svg"
                            x={status.x}
                            y={status.y}
                            width={status.width}
                            height={status.height}
                            rx={rectRadius}
                        ></rect>
                        <text
                            class="status-text-svg"
                            x={status.textX}
                            y={status.textY}
                            text-anchor="middle"
                            dominant-baseline="middle"
                        >
                            {status.name}
                        </text>
                    </g>
                </template>
            </svg>
        </template>
        
        <template if:false={sortedStatuses}>
            <div class="slds-text-color_weak slds-m-around_medium">
                No workflow data available
            </div>
        </template>

        <!-- Inline Create Status Modal -->
        <template if:true={showCreateModal}>
            <div class="modal-backdrop" onclick={closeCreateModal}></div>
            <div class="modal-container">
                <div class="modal-header">
                    <h2 class="modal-title">Create New Status</h2>
                    <button class="close-button" onclick={closeCreateModal} title="Close">✕</button>
                </div>

                <div class="modal-body">
                    <div class="form-group">
                        <label for="statusNameInput" class="form-label">Status Name</label>
                        <input
                            id="statusNameInput"
                            type="text"
                            class="form-input"
                            placeholder="Enter status name"
                            value={newStatusName}
                            onchange={handleStatusNameChange}
                            onkeypress={handleModalKeyPress}
                            disabled={isCreatingStatus}
                        />
                    </div>

                    <template if:true={createStatusErrorMessage}>
                        <div class="error-message">
                            <span class="error-icon">⚠</span>
                            <span>{createStatusErrorMessage}</span>
                        </div>
                    </template>
                </div>

                <div class="modal-footer">
                    <button class="btn btn-secondary" onclick={closeCreateModal} disabled={isCreatingStatus}>Cancel</button>
                    <button class="btn btn-primary" onclick={handleCreateSubmit} disabled={isCreatingStatus}>
                        <template if:false={isCreatingStatus}>Create Status</template>
                        <template if:true={isCreatingStatus}>Creating...</template>
                    </button>
                </div>
            </div>
        </template>

        <!-- Create Transition Modal Component -->
        <c-create-transition-modal
            if:true={showCreateTransitionModal}
            from-status={selectedFromStatus}
            to-status={selectedToStatus}
            workflow-id={workflowData.workflow.id}
            is-open={showCreateTransitionModal}
            ontransitioncreated={handleTransitionCreated}
            onclose={handleCloseCreateTransitionModal}
        ></c-create-transition-modal>

        <!-- Transition Detail Panel -->
        <template if:true={showTransitionDetail}>
            <div class="transition-detail-panel">
                <c-workflow-transition-detail
                    transition-id={selectedTransitionId}
                    ontransitiondeleted={handleTransitionDeleted}
                    onclose={handleCloseTransitionDetail}
                ></c-workflow-transition-detail>
            </div>
        </template>
    </div>
</template>
