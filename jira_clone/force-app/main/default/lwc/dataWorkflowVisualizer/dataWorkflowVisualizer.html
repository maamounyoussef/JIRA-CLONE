<template>
    <div class="workflow-visualizer-container">
        <!-- Toolbar -->
        <div class="toolbar">
            <lightning-button
                variant="brand"
                label="Create Status"
                onclick={openCreateStatusModal}
                icon-name="utility:add"
            ></lightning-button>
            <span class="toolbar-info">
                <template if:true={selectedFromStatus}>
                    <strong>From: {selectedFromStatus.name}</strong>
                    <template if:true={selectedToStatus}>
                        → To: {selectedToStatus.name}
                    </template>
                </template>
                <template if:false={selectedFromStatus}>
                    Click two statuses to create a transition
                </template>
            </span>
        </div>

        <!-- Legend for Transition Types -->
        <div class="legend-container">
            <div class="legend-title">Transition Types:</div>
            <div class="legend-items">
                <div class="legend-item">
                    <svg class="legend-svg" viewBox="0 0 100 20" xmlns="http://www.w3.org/2000/svg">
                        <line x1="5" y1="10" x2="50" y2="10" stroke="#1b96ff" stroke-width="2" />
                        <polygon points="45 5, 55 10, 45 15" fill="#1b96ff" />
                    </svg>
                    <span class="legend-label">Active Transition</span>
                </div>
                <div class="legend-item">
                    <svg class="legend-svg" viewBox="0 0 100 20" xmlns="http://www.w3.org/2000/svg">
                        <line x1="5" y1="10" x2="50" y2="10" stroke="#FFA500" stroke-width="2" stroke-dasharray="5,5" />
                        <polygon points="45 5, 55 10, 45 15" fill="#FFA500" />
                    </svg>
                    <span class="legend-label">Pending Transition</span>
                </div>
            </div>
        </div>

        <template if:true={sortedStatuses}>
            <!-- SVG Canvas for Everything -->
            <svg class="workflow-svg" viewBox={svgViewBox} xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
                <defs>
                    <!-- Status gradient -->
                    <linearGradient id="statusGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#0070d2;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#0052cc;stop-opacity:1" />
                    </linearGradient>
                    
                    <!-- Arrow marker for active transition line endings -->
                    <marker
                        id="arrowhead"
                        marker-width="10"
                        marker-height="10"
                        orient="auto"
                    >
                        <polygon points="0 0, 10 3, 0 6" fill="#1b96ff" />
                    </marker>
                    
                    <!-- Arrow marker for pending transition line endings -->
                    <marker
                        id="arrowhead-pending"
                        marker-width="10"
                        marker-height="10"
                        orient="auto"
                    >
                        <polygon points="0 0, 10 3, 0 6" fill="#FFA500" />
                    </marker>
                </defs>

                <!-- Active Transition Lines -->
                <template for:each={activeTransitionLines} for:item="line">
                    <g key={line.id} class="transition-line-group active-transition" data-line-id={line.id} onclick={handleTransitionClick}>
                        <path
                            class="transition-line"
                            d={line.path}
                            stroke="#1b96ff"
                            stroke-width="2"
                            fill="none"
                            marker-end="url(#arrowhead)"
                        ></path>
                    </g>
                </template>

                <!-- Pending Transition Lines -->
                <template for:each={pendingTransitionLines} for:item="line">
                    <g key={line.id} class="transition-line-group pending-transition" data-line-id={line.id} onclick={handleTransitionClick}>
                        <path
                            class="transition-line pending"
                            d={line.path}
                            stroke="#FFA500"
                            stroke-width="2"
                            stroke-dasharray="5,5"
                            fill="none"
                            marker-end="url(#arrowhead-pending)"
                        ></path>
                    </g>
                </template>

                <!-- Status Rectangles -->
                <template for:each={statusesWithSVGData} for:item="status">
                    <g 
                        key={status.id} 
                        class="status-group" 
                        data-status-id={status.id}
                        onclick={handleStatusClick}
                    >
                        <rect
                            class="status-rectangle-svg"
                            x={status.x}
                            y={status.y}
                            width={status.width}
                            height={status.height}
                            rx="4"
                        ></rect>
                        <text
                            class="status-text-svg"
                            x={status.textX}
                            y={status.textY}
                            text-anchor="middle"
                            dominant-baseline="middle"
                        >
                            {status.name}
                        </text>
                    </g>
                </template>
            </svg>
        </template>
        
        <template if:false={sortedStatuses}>
            <div class="slds-text-color_weak slds-m-around_medium">
                No workflow data available
            </div>
        </template>

        <!-- Create Status Modal Component -->
        <c-create-status-modal
            is-open={showCreateModal}
            onstatuscreated={handleStatusCreated}
            onclose={handleCreateStatusModalClose}
        ></c-create-status-modal>

        <!-- Create Transition Modal Component -->
        <c-create-transition-modal
            if:true={showCreateTransitionModal}
            from-status={selectedFromStatus}
            to-status={selectedToStatus}
            workflow-id={workflowData.workflow.id}
            is-open={showCreateTransitionModal}
            ontransitioncreated={handleTransitionCreated}
            onclose={handleCloseCreateTransitionModal}
        ></c-create-transition-modal>

        <!-- Transition Detail Panel -->
        <template if:true={showTransitionDetail}>
            <div class="transition-detail-panel">
                <c-workflow-transition-detail
                    transition-id={selectedTransitionId}
                    ontransitiondeleted={handleTransitionDeleted}
                    onclose={handleCloseTransitionDetail}
                ></c-workflow-transition-detail>
            </div>
        </template>
    </div>
</template>
