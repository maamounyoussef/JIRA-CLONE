<template>
    <!-- Form Component -->
    <template if:true={showForm}>
        <c-manage-workflow-form onlaunchworkflow={handleLaunchWorkflow}></c-manage-workflow-form>
    </template>

    <!-- Workflow Manager Component -->
    <template if:true={showWorkflow}>
        <div class="slds-m-bottom_medium">
            <lightning-button
                variant="neutral"
                label="< Back to Selection"
                onclick={handleBack}
                icon-name="utility:back"
            ></lightning-button>
        </div>
        
        <!-- Workflow Visualization -->
        <lightning-card title="Workflow Visualization" icon-name="utility:flow">
            <template if:true={workflowData}>
                <c-data-workflow-visualizer 
                    workflow-data={workflowData}
                ></c-data-workflow-visualizer>
            </template>
            <template if:false={workflowData}>
                <div class="slds-m-around_medium">
                    <lightning-spinner alternative-text="Loading..."></lightning-spinner>
                </div>
            </template>
        </lightning-card>
    </template>
</template>
